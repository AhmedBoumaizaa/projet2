<div class="container mt-4">
  <div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">{{ajout ? 'Ajouter' : 'Modifier'}} un Secteur</h4>
    </div>

    <div class="card-body">
      <form >

        <div class="mb-3 w-50" [hidden]="ajout">
          <label class="form-label">ID Secteur</label>
          <input readonly type="text" [(ngModel)]="secteur.idSec" name="idSec" class="form-control" placeholder="Entrez l'ID de secteur">
        </div>

        <div class="mb-3">
          <label class="form-label">Nom Secteur</label>
          <input type="text" [(ngModel)]="secteur.nomSec" name="nomSec" class="form-control" placeholder="Entrez un nom de Secteur" required>
        </div>

        <div class="text-end">
          <button type="button" class="btn btn-success px-4" [disabled]="!secteur.nomSec" (click)="saveSecteur()">
            {{ajout ? 'Ajouter' : 'Modifier'}}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
