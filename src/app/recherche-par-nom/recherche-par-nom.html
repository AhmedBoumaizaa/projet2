<h1 class="text-center mt-3">Recherche des Montres par Nom</h1>

<div class="container">

  <!-- Recherche par saisie dynamique -->
  <form class="form-inline mt-4">
    <div class="form-group mx-sm-3 mb-3">
      <label for="searchTerm" class="form-label">Nom Montre (en tapant) :</label>
      <input id="searchTerm"
             type="text"
             class="form-control"
             placeholder="Tapez un nom..."
             [(ngModel)]="searchTerm"
             name="searchTerm"
             (keyup)="onKeyUp(searchTerm)" />
    </div>
  </form>

  <!-- Recherche par nom exact -->
  <form class="form-inline">
    <div class="form-group mx-sm-3 mb-2 mt-2">
      <label for="nomWatch" class="form-label">Nom Montre :</label>
      <input id="nomWatch"
             type="text"
             class="form-control"
             [(ngModel)]="nomWatch"
             name="nomWatch"
             placeholder="Saisir le nom exact" />
      <button type="button"
              (click)="rechercherWatches()"
              class="btn btn-primary mb-2 ms-2 mt-2">
        Rechercher
      </button>
    </div>
  </form>

  <!-- Résultats -->
  <div *ngIf="watches.length > 0; else aucunResultat" class="card shadow mt-3 mb-4">
    <div class="card-body">
      <table class="table table-bordered table-striped">
        <thead class="thead-dark">
          <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Modèle</th>
            <th>Prix</th>
            <th>Date de Création</th>
            <th *ngIf="authService.isAdmin()">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let watch of watches">
            <td>{{ watch.idWatch }}</td>
            <td>{{ watch.nomWatch }}</td>
            <td>{{ watch.nomModel || 'PAS DE MODELE' }}</td>
            <td>{{ watch.prixWatch | number }}</td>
            <td>{{ watch.dateCreation | date:'dd/MM/yyyy' }}</td>
            <td *ngIf="authService.isAdmin()">
              <button class="btn btn-success btn-sm me-2" (click)="modifierWatch(watch)">
                Modifier
              </button>
              <button class="btn btn-danger btn-sm" (click)="supprimerWatch(watch)">
                Supprimer
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Message si aucun résultat -->
  <ng-template #aucunResultat>
    <p *ngIf="searchTerm || nomWatch" class="mt-3 text-muted">
      Aucune montre trouvée pour ce nom.
    </p>
  </ng-template>

</div>
